name: Run Survey Bot

on:
  workflow_dispatch:
    inputs:
      runs:
        description: "Number of survey submissions"
        required: false
        default: "250"

jobs:
  survey:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Run survey bot
        env:
          TOTAL_RUNS: ${{ github.event.inputs.runs || '250' }}
        run: python survey_bot.py
